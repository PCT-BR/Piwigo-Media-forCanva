name: Release Canva app

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/workflows/release-canva-app.yml
      - release/**

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: piwigo-media-for-canva-v1.0.0
      RELEASE_TITLE: Piwigo Media for Canva 1.0.0
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Verify release assets
        shell: bash
        run: |
          set -euo pipefail

          test -s release/app.js
          test -s release/messages_en.json

          echo "app.js sha256:"
          sha256sum release/app.js
          echo "messages_en.json sha256:"
          sha256sum release/messages_en.json

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" release/app.js release/messages_en.json --clobber
          else
            gh release create "$RELEASE_TAG" release/app.js release/messages_en.json \
              --target "$GITHUB_SHA" \
              --title "$RELEASE_TITLE" \
              --notes "Canva Developer Portal assets: JavaScript bundle and English UI strings."
          fi
